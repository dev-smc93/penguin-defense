<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0277bd" />
  <meta name="description" content="펭귄 히어로를 소환하고 합성하여 좀비를 막아라!" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <title>펭귄 대모험: 꽁꽁 방어전</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100dvh;
      height: 100vh;
      overflow: hidden;
      background: #0a1628;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    canvas { display: block; }
    #pwa-install-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #0277bd, #01579b);
      padding: 12px 16px;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      font-family: Arial, sans-serif;
      animation: slideDown 0.3s ease-out;
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }
    .pwa-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e1f5fe;
      font-size: 14px;
      font-weight: bold;
    }
    .pwa-info span.icon { font-size: 24px; }
    .pwa-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #pwa-install-btn {
      background: #ffffff;
      color: #01579b;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }
    #pwa-dismiss-btn {
      background: none;
      border: none;
      color: #b3e5fc;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-BERIeHzo.js"></script>
</head>
<body>
  <div id="pwa-install-banner">
    <div class="pwa-info">
      <span class="icon">🐧</span>
      <span>펭귄 대모험 설치</span>
    </div>
    <div class="pwa-actions">
      <button id="pwa-install-btn">설치하기</button>
      <button id="pwa-dismiss-btn">✕</button>
    </div>
  </div>
  <div id="game-container"></div>
</body>
</html>
